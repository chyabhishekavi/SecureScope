<main class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Login to SecureScope</mat-card-title>
      <mat-card-subtitle>Access your security scanning workspace.</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" autocomplete="current-password" />
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button mat-flat-button color="primary" type="button">Login</button>
      <a mat-button routerLink="/register">Create account</a>
    </mat-card-actions>
  </mat-card>
</main>
