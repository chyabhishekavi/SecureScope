<mat-toolbar class="header">
  <a class="brand" routerLink="/" aria-label="SecureScope home">
    <span class="brand-mark">S</span>
    <span>SecureScope</span>
  </a>

  <span class="spacer"></span>

  @if (authService.currentUser(); as user) {
    <span class="user-chip">{{ user.name }}</span>
    <button mat-button type="button" (click)="logout()">Logout</button>
  } @else {
    <a mat-button routerLink="/login">Login</a>
    <a mat-flat-button color="primary" routerLink="/register">Register</a>
  }
</mat-toolbar>
